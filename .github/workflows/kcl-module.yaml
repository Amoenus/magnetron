name: KCL module

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish KCL module
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: false

      - name: Install KCL CLI
        run: go install kcl-lang.io/cli/cmd/kcl@v0.12.4

      - name: Validate KCL module
        run: kcl run image.k

      - name: Log in to GHCR
        run: kcl registry login -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}" ghcr.io

      - name: Publish module
        run: kcl mod push oci://ghcr.io/amoenus/magnetron-kcl --force

      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          module_version="$(sed -n 's/^version = "\(.*\)"/\1/p' kcl.mod)"
          if [[ "${version}" != "${module_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match kcl.mod version ${module_version}" >&2
            exit 1
          fi

          image_repository="$(sed -n 's/^repository = "\(.*\)"/\1/p' image.k)"
          image_digest="$(sed -n 's/^digest = "\(.*\)"/\1/p' image.k)"
          image_ref="${image_repository}@${image_digest}"
          image_tag="${image_repository}:${GITHUB_REF_NAME}"
          module_ref="oci://ghcr.io/amoenus/magnetron-kcl:${version}"
          notes="$(cat <<EOF
          ## OCI image

          Human-readable tag:

          \`\`\`text
          ${image_tag}
          \`\`\`

          Immutable digest:

          \`\`\`text
          ${image_ref}
          \`\`\`

          ## KCL module

          \`\`\`text
          ${module_ref}
          \`\`\`

          Published images are signed with Sigstore Cosign keyless signing.
          EOF
          )"

          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "Magnetron ${GITHUB_REF_NAME}" \
            --notes "${notes}" \
            --generate-notes
