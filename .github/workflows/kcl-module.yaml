name: KCL module

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to retag, for example vX.Y.Z."
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    name: Publish KCL module
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
      MODULE_REPOSITORY: ghcr.io/amoenus/magnetron-kcl
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: false

      - name: Install KCL CLI
        run: go install kcl-lang.io/cli/cmd/kcl@v0.12.4

      - name: Install crane
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/google/go-containerregistry/cmd/crane@v0.20.6
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Prepare release module metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z: ${RELEASE_TAG}" >&2
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          image_repository="$(sed -n 's/^repository = "\(.*\)"/\1/p' image.k)"

          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

          image_digest=""
          for attempt in {1..60}; do
            if image_digest="$(crane digest "${image_repository}:${RELEASE_TAG}" 2>/dev/null)"; then
              break
            fi
            echo "Waiting for ${image_repository}:${RELEASE_TAG} to be available (${attempt}/60)"
            sleep 30
          done

          if [[ -z "${image_digest}" ]]; then
            echo "Could not resolve digest for ${image_repository}:${RELEASE_TAG}" >&2
            exit 1
          fi

          sed -i -E "s/^version = \".*\"/version = \"${version}\"/" kcl.mod
          cat > image.k <<EOF
          repository = "${image_repository}"
          tag = "${RELEASE_TAG}"
          digest = "${image_digest}"
          ref = "\${repository}@\${digest}"
          EOF

      - name: Validate KCL module
        shell: bash
        run: |
          set -euo pipefail
          image_repository="$(sed -n 's/^repository = "\(.*\)"/\1/p' image.k)"
          image_digest="$(sed -n 's/^digest = "\(.*\)"/\1/p' image.k)"
          image_ref="$(sed -n 's/^ref = "\(.*\)"/\1/p' image.k)"
          test "${image_ref}" = '${repository}@${digest}'
          test "${image_repository}@${image_digest}" = "$(kcl run image.k | sed -n 's/^ref: //p')"

          kcl run image.k
          kcl run kubernetes.k

      - name: Log in to GHCR
        run: kcl registry login -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}" ghcr.io

      - name: Publish module
        run: kcl mod push "oci://${MODULE_REPOSITORY}" --force

      - name: Tag latest KCL module
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          crane tag "${MODULE_REPOSITORY}:${version}" latest
          version_digest="$(crane digest "${MODULE_REPOSITORY}:${version}")"
          latest_digest="$(crane digest "${MODULE_REPOSITORY}:latest")"
          test "${version_digest}" = "${latest_digest}"

      - name: Tag release OCI image
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          module_version="$(sed -n 's/^version = "\(.*\)"/\1/p' kcl.mod)"
          if [[ "${version}" != "${module_version}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match kcl.mod version ${module_version}" >&2
            exit 1
          fi

          image_repository="$(sed -n 's/^repository = "\(.*\)"/\1/p' image.k)"
          image_digest="$(sed -n 's/^digest = "\(.*\)"/\1/p' image.k)"
          crane tag "${image_repository}@${image_digest}" "${RELEASE_TAG}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign release OCI image tag
        shell: bash
        run: |
          set -euo pipefail
          image_repository="$(sed -n 's/^repository = "\(.*\)"/\1/p' image.k)"
          cosign sign --yes "${image_repository}:${RELEASE_TAG}"

      - name: Verify release OCI image tag signature
        shell: bash
        run: |
          set -euo pipefail
          image_repository="$(sed -n 's/^repository = "\(.*\)"/\1/p' image.k)"
          identity='https://github.com/Amoenus/magnetron/.github/workflows/kcl-module.yaml@refs/(heads/main|tags/v[0-9]+\.[0-9]+\.[0-9]+)'
          cosign verify "${image_repository}:${RELEASE_TAG}" \
            --certificate-identity-regexp "${identity}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          module_version="$(sed -n 's/^version = "\(.*\)"/\1/p' kcl.mod)"
          if [[ "${version}" != "${module_version}" ]]; then
            echo "Tag ${RELEASE_TAG} does not match kcl.mod version ${module_version}" >&2
            exit 1
          fi

          image_repository="$(sed -n 's/^repository = "\(.*\)"/\1/p' image.k)"
          image_digest="$(sed -n 's/^digest = "\(.*\)"/\1/p' image.k)"
          image_ref="${image_repository}@${image_digest}"
          image_tag="${image_repository}:${RELEASE_TAG}"
          module_ref="oci://${MODULE_REPOSITORY}:${version}"
          module_latest_ref="oci://${MODULE_REPOSITORY}:latest"
          notes="$(cat <<EOF
          ## OCI image

          Human-readable tag:

          \`\`\`text
          ${image_tag}
          \`\`\`

          Immutable digest:

          \`\`\`text
          ${image_ref}
          \`\`\`

          ## KCL module

          Latest:

          \`\`\`text
          ${module_latest_ref}
          \`\`\`

          Versioned:

          \`\`\`text
          ${module_ref}
          \`\`\`

          Published images are signed with Sigstore Cosign keyless signing.
          EOF
          )"

          gh release create "${RELEASE_TAG}" \
            --verify-tag \
            --title "Magnetron ${RELEASE_TAG}" \
            --notes "${notes}" \
            --generate-notes
