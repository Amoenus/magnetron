name: KCL module

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish KCL module
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install KCL CLI
        run: go install kcl-lang.io/cli/cmd/kcl@v0.12.4

      - name: Validate KCL module
        run: kcl run image.k

      - name: Log in to GHCR
        run: kcl registry login -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}" ghcr.io

      - name: Publish module
        run: kcl mod push oci://ghcr.io/amoenus/magnetron-kcl --force
