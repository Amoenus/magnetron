name: OCI image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/amoenus/magnetron
  BUILDER: paketobuildpacks/builder-jammy-base

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest -q

  build:
    name: Build ${{ matrix.arch }} image
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1

      - name: Trust builder
        run: pack config trusted-builders add "${BUILDER}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            refs=("pr-${{ github.event.number }}")
            image="magnetron"
          else
            image="${IMAGE}"
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              refs=("${GITHUB_REF_NAME}")
            else
              refs=("${GITHUB_REF_NAME}")
            fi
            refs+=("sha-${GITHUB_SHA::7}")
          fi

          primary="${image}:${refs[0]}-${{ matrix.arch }}"
          tag_args=""
          for ref in "${refs[@]:1}"; do
            tag_args="${tag_args} --tag ${image}:${ref}-${{ matrix.arch }}"
          done
          {
            echo "primary=${primary}"
            echo "args=${tag_args}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build image with Cloud Native Buildpacks
        shell: bash
        run: |
          set -euo pipefail
          publish_arg=""
          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            publish_arg="--publish"
          fi

          pack build "${{ steps.tags.outputs.primary }}" \
            --builder "${BUILDER}" \
            --path . \
            ${publish_arg} \
            ${{ steps.tags.outputs.args }} \
            --env BP_CPYTHON_VERSION=3.13.* \
            --env BP_OCI_TITLE=Magnetron \
            --env "BP_OCI_DESCRIPTION=Small internal web UI and API for sending magnet links to bitmagnet and qBittorrent." \
            --env BP_OCI_URL=https://github.com/Amoenus/magnetron \
            --env BP_OCI_DOCUMENTATION=https://github.com/Amoenus/magnetron#readme \
            --env BP_OCI_SOURCE=https://github.com/Amoenus/magnetron \
            --env BP_OCI_VENDOR=Amoenus \
            --env BP_OCI_AUTHORS=Amoenus \
            --env BP_OCI_LICENSES=MIT \
            --env BP_OCI_VERSION="${GITHUB_REF_NAME}" \
            --env BP_OCI_REVISION="${GITHUB_SHA}"

  manifest:
    name: Publish multi-arch manifest
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Set up pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish manifest tags
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            refs=("${GITHUB_REF_NAME}")
          else
            refs=("${GITHUB_REF_NAME}")
          fi
          refs+=("sha-${GITHUB_SHA::7}")

          for ref in "${refs[@]}"; do
            pack manifest create "${IMAGE}:${ref}" \
              "${IMAGE}:${ref}-amd64" \
              "${IMAGE}:${ref}-arm64" \
              --publish
          done
