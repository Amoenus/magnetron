name: OCI image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/amoenus/magnetron
  APKO_VERSION: v1.2.21
  MELANGE_VERSION: v0.56.0

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

  apk-key:
    name: Generate ephemeral APK key
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: false

      - name: Install melange
        shell: bash
        run: |
          set -euo pipefail
          go install "chainguard.dev/melange@${MELANGE_VERSION}"
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Generate local APK signing key
        run: melange keygen

      - name: Upload APK keypair
        uses: actions/upload-artifact@v7
        with:
          name: melange-keypair
          path: |
            melange.rsa
            melange.rsa.pub
          if-no-files-found: error
          retention-days: 1

      - name: Upload APK public key
        uses: actions/upload-artifact@v7
        with:
          name: melange-public-key
          path: melange.rsa.pub
          if-no-files-found: error
          retention-days: 1

  package:
    name: Package APK for ${{ matrix.oci_arch }}
    needs:
      - test
      - apk-key
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - oci_arch: amd64
            melange_arch: amd64
            apk_arch: x86_64
            runner: ubuntu-latest
          - oci_arch: arm64
            melange_arch: aarch64
            apk_arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: false

      - name: Install Bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Install melange
        shell: bash
        run: |
          set -euo pipefail
          go install "chainguard.dev/melange@${MELANGE_VERSION}"
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Download APK signing key
        uses: actions/download-artifact@v8
        with:
          name: melange-keypair
          path: .

      - name: Restrict APK signing key permissions
        run: chmod 600 melange.rsa

      - name: Build Magnetron APK
        run: sudo "$(go env GOPATH)/bin/melange" build melange.yaml --arch "${{ matrix.melange_arch }}" --runner bubblewrap --signing-key melange.rsa

      - name: Verify APK runtime payload
        shell: bash
        run: |
          set -euo pipefail
          apk_path="$(find "packages/${{ matrix.apk_arch }}" -name 'magnetron-*.apk' -print -quit)"
          test -n "${apk_path}"
          tar -tzf "${apk_path}" | grep -F 'usr/bin/magnetron'
          tar -tzf "${apk_path}" | grep -F 'usr/share/magnetron/site/uvicorn/__init__.py'

      - name: Upload APK package
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.apk_arch }}
          path: packages/${{ matrix.apk_arch }}
          if-no-files-found: error

  image:
    name: Build OCI image
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download APK packages
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: packages

      - name: Normalize APK package layout
        shell: bash
        run: |
          set -euo pipefail
          mv packages/packages-x86_64 packages/x86_64
          mv packages/packages-aarch64 packages/aarch64

      - name: Download APK public key
        uses: actions/download-artifact@v8
        with:
          name: melange-public-key
          path: .

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: false

      - name: Install apko
        shell: bash
        run: |
          set -euo pipefail
          go install "chainguard.dev/apko@${APKO_VERSION}"
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Build pull request image tar
        if: github.event_name == 'pull_request'
        run: apko build apko.yaml magnetron:pr magnetron.tar -k melange.rsa.pub

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | apko login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute image tags
        if: github.event_name != 'pull_request'
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            refs=("${GITHUB_REF_NAME}")
          else
            refs=("${GITHUB_REF_NAME}")
          fi
          refs+=("sha-${GITHUB_SHA::7}")

          {
            echo "tags<<EOF"
            for ref in "${refs[@]}"; do
              echo "${IMAGE}:${ref}"
            done
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish OCI image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          : > image-refs.txt
          while IFS= read -r tag; do
            apko publish apko.yaml "${tag}" -k melange.rsa.pub | tee apko-publish.log
            grep -F "${IMAGE}@sha256:" apko-publish.log >> image-refs.txt
          done <<< "${{ steps.tags.outputs.tags }}"
          sort -u image-refs.txt -o image-refs.txt
          cat image-refs.txt

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign OCI image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r ref; do
            cosign sign --recursive --yes "${ref}"
          done < image-refs.txt

      - name: Verify OCI image signatures
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          identity='https://github.com/Amoenus/magnetron/.github/workflows/oci-image.yaml@refs/(heads/main|tags/v[0-9]+\.[0-9]+\.[0-9]+)'
          while IFS= read -r ref; do
            cosign verify "${ref}" \
              --certificate-identity-regexp "${identity}" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
          done < image-refs.txt
