name: OCI image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/amoenus/magnetron
  APKO_VERSION: v1.2.21
  MELANGE_VERSION: v0.56.0

jobs:
  test:
    name: Typecheck and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  apk-key:
    name: Generate ephemeral APK key
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: false

      - name: Install melange
        shell: bash
        run: |
          set -euo pipefail
          go install "chainguard.dev/melange@${MELANGE_VERSION}"
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Generate local APK signing key
        run: melange keygen

      - name: Upload APK keypair
        uses: actions/upload-artifact@v7
        with:
          name: melange-keypair
          path: |
            melange.rsa
            melange.rsa.pub
          if-no-files-found: error
          retention-days: 1

      - name: Upload APK public key
        uses: actions/upload-artifact@v7
        with:
          name: melange-public-key
          path: melange.rsa.pub
          if-no-files-found: error
          retention-days: 1

  package:
    name: Package APK for ${{ matrix.oci_arch }}
    needs:
      - test
      - apk-key
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - oci_arch: amd64
            melange_arch: amd64
            apk_arch: x86_64
            runner: ubuntu-latest
          - oci_arch: arm64
            melange_arch: aarch64
            apk_arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: false

      - name: Install Bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Install melange
        shell: bash
        run: |
          set -euo pipefail
          go install "chainguard.dev/melange@${MELANGE_VERSION}"
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Download APK signing key
        uses: actions/download-artifact@v8
        with:
          name: melange-keypair
          path: .

      - name: Restrict APK signing key permissions
        run: chmod 600 melange.rsa

      - name: Prepare release package metadata
        shell: bash
        run: |
          set -euo pipefail
          version="0.0.0"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tag must match vX.Y.Z: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
            version="${GITHUB_REF_NAME#v}"
          fi

          npm pkg set "version=${version}"
          sed -i -E "s/^(  version: ).*/\1${version}/" melange.yaml

      - name: Build Magnetron APK
        run: sudo "$(go env GOPATH)/bin/melange" build melange.yaml --arch "${{ matrix.melange_arch }}" --runner bubblewrap --signing-key melange.rsa

      - name: Verify APK runtime payload
        shell: bash
        run: |
          set -euo pipefail
          apk_path="$(find "packages/${{ matrix.apk_arch }}" -name 'magnetron-*.apk' -print -quit)"
          test -n "${apk_path}"
          tar -tzf "${apk_path}" | grep -F 'usr/bin/magnetron'
          tar -tzf "${apk_path}" | grep -F 'usr/share/magnetron/server.js'
          tar -tzf "${apk_path}" | grep -F 'usr/share/magnetron/.next/static'

      - name: Upload APK package
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.apk_arch }}
          path: packages/${{ matrix.apk_arch }}
          if-no-files-found: error

  image:
    name: Build OCI image
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download APK packages
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: packages

      - name: Normalize APK package layout
        shell: bash
        run: |
          set -euo pipefail
          mv packages/packages-x86_64 packages/x86_64
          mv packages/packages-aarch64 packages/aarch64

      - name: Download APK public key
        uses: actions/download-artifact@v8
        with:
          name: melange-public-key
          path: .

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: false

      - name: Install apko
        shell: bash
        run: |
          set -euo pipefail
          go install "chainguard.dev/apko@${APKO_VERSION}"
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Install crane
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/google/go-containerregistry/cmd/crane@v0.21.7
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Prepare OCI image metadata
        shell: bash
        run: |
          set -euo pipefail
          version="0.0.0"
          runtime_version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tag must match vX.Y.Z: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
            version="${GITHUB_REF_NAME#v}"
            runtime_version="${version}"
          fi

          sed -i -E "s/^(  org.opencontainers.image.version: ).*/\1${version}/" apko.yaml
          sed -i -E "s/^(  org.opencontainers.image.revision: ).*/\1${GITHUB_SHA}/" apko.yaml
          sed -i -E "s/^(  MAGNETRON_VERSION: ).*/\1\"${runtime_version}\"/" apko.yaml
          sed -i -E "s/^(  MAGNETRON_REVISION: ).*/\1${GITHUB_SHA}/" apko.yaml

      - name: Build pull request image tar
        if: github.event_name == 'pull_request'
        run: apko build apko.yaml magnetron:pr magnetron.tar -k melange.rsa.pub

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | apko login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute image tags
        if: github.event_name != 'pull_request'
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            refs=("${GITHUB_REF_NAME}")
          else
            refs=("${GITHUB_REF_NAME}")
          fi
          refs+=("sha-${GITHUB_SHA::7}")

          {
            echo "tags<<EOF"
            for ref in "${refs[@]}"; do
              echo "${IMAGE}:${ref}"
            done
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish OCI image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          : > image-refs.txt
          while IFS= read -r tag; do
            apko publish apko.yaml "${tag}" -k melange.rsa.pub | tee apko-publish.log
            grep -F "${IMAGE}@sha256:" apko-publish.log >> image-refs.txt
          done <<< "${{ steps.tags.outputs.tags }}"
          sort -u image-refs.txt -o image-refs.txt
          cat image-refs.txt

      - name: Verify published OCI metadata
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

          expected_version="0.0.0"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            expected_version="${GITHUB_REF_NAME#v}"
          fi

          while IFS= read -r ref; do
            manifest="$(crane manifest "${ref}")"
            media_type="$(jq -r '.mediaType' <<< "${manifest}")"
            test "${media_type}" = "application/vnd.oci.image.index.v1+json"

            jq -e '
              [.manifests[].mediaType] | all(. == "application/vnd.oci.image.manifest.v1+json")
            ' <<< "${manifest}" >/dev/null
            jq -e '
              [.manifests[].platform | "\(.os)/\(.architecture)"] as $platforms
              | ($platforms | index("linux/amd64")) and ($platforms | index("linux/arm64"))
            ' <<< "${manifest}" >/dev/null

            actual_version="$(jq -r '.annotations["org.opencontainers.image.version"]' <<< "${manifest}")"
            actual_revision="$(jq -r '.annotations["org.opencontainers.image.revision"]' <<< "${manifest}")"
            test "${actual_version}" = "${expected_version}"
            test "${actual_revision}" = "${GITHUB_SHA}"
          done < image-refs.txt

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign OCI image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r ref; do
            cosign sign --recursive --yes "${ref}"
          done < image-refs.txt

      - name: Verify OCI image signatures
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          identity='https://github.com/Amoenus/magnetron/.github/workflows/oci-image.yaml@refs/(heads/main|tags/v[0-9]+\.[0-9]+\.[0-9]+)'
          while IFS= read -r ref; do
            cosign verify "${ref}" \
              --certificate-identity-regexp "${identity}" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
          done < image-refs.txt
