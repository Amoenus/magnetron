package:
  name: magnetron
  version: 0.0.0
  epoch: 0
  description: Small internal web UI and API for sending magnet links to bitmagnet and qBittorrent.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ca-certificates-bundle
      - nodejs-24

environment:
  contents:
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
      - ./melange.rsa.pub
    repositories:
      - https://packages.wolfi.dev/os
    packages:
      - busybox
      - ca-certificates-bundle
      - nodejs-24
      - npm

pipeline:
  - name: Install Magnetron application
    runs: |
      app_home="${{targets.destdir}}/usr/share/magnetron"
      bin_dir="${{targets.destdir}}/usr/bin"

      mkdir -p "${app_home}" "${bin_dir}"

      export NEXT_TELEMETRY_DISABLED=1
      export SKIP_ENV_VALIDATION=1
      npm ci
      npm run build

      cp -R .next/standalone/. "${app_home}/"
      mkdir -p "${app_home}/.next"
      cp -R .next/static "${app_home}/.next/static"
      cp -R public "${app_home}/public"
      cp README.md LICENSE package.json "${app_home}/"

      cat > "${bin_dir}/magnetron" <<'EOF'
      #!/bin/sh
      export HOSTNAME="${HOSTNAME:-0.0.0.0}"
      export PORT="${PORT:-8080}"
      exec /usr/bin/node /usr/share/magnetron/server.js
      EOF
      chmod +x "${bin_dir}/magnetron"
