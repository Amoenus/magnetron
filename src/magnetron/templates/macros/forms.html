{% macro select_field(name, label, options, selected) %}
<div class="field">
  <label for="{{ name }}">{{ label }}</label>
  <select id="{{ name }}" name="{{ name }}">
    {% for option in options %}
    {% set value = option.value if option.value is defined else option %}
    {% set text = option.label if option.label is defined else option %}
    <option value="{{ value }}" {% if value == selected %}selected{% endif %}>{{ text }}</option>
    {% endfor %}
  </select>
</div>
{% endmacro %}

{% macro text_field(name, label, value='', placeholder='', autocomplete='off', input_type='text', readonly=False) %}
<div class="field">
  <label for="{{ name }}">{{ label }}</label>
  <input
    id="{{ name }}"
    name="{{ name }}"
    type="{{ input_type }}"
    value="{{ value }}"
    placeholder="{{ placeholder }}"
    autocomplete="{{ autocomplete }}"
    {% if readonly %}readonly{% endif %}
  >
</div>
{% endmacro %}
